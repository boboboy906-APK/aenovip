name: Build APK
on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Gradle
        run: sudo apt update && sudo apt install -y gradle

      - name: Generate Wrapper
        run: gradle wrapper

      - name: Chmod
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: "**/build/outputs/apk/debug/*.apk"
          
